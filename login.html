<!DOCTYPE html>
<html lang ="en">
  <head> 
    <meta charset="UTF-8">
    <meta name-"viewport" content="width=width=device-width, initial-scale=1.0">
    
    <title>
        Login | Meticulous Budgeting
    </title>

    <link rel="stylesheet" href="style.css">
  </head>
  
  <body>
    <main>
      <section>
        <h1>
          It is nice to see you again!
        </h1>

        <p>
          Log in to continue your path in financial literacy.
        </p>

        <form>
          <label for="email">
            Email
          </label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          >

          <label for="password">
              Password
          </label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            required
          >

          <button
            type="submit"
          >
            Log In
          </button>
        </form>
        <p>
          Don't have an account?
          <a href="signup.html">
            Sign Up
          </a>
        </p>
      </section>
    </main>
  </body>
</html>
