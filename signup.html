<!DOCTYPE html>
<html lang="en">
  <head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>
        Sign Up | Meticulous Budgeting
    </title>

    <link rel="stylesheet" href="style.css">
  </head>
  
  

  <body>
    <main>
      <section class="auth-card">
        <h1>
          Start your journey to financial literacy today!
        </h1>

        <p>
          Let's help you set up your account.
        </p>

        <form id="signupForm">
          <label for="fullName">
            Full Name
          </label>
          <input
            type="text"
            id="fullName"
            name="fullName"
            minlength="2"
            maxlength="64"
            placeholder="Enter your full name"
            autocomplete="name"
            pattern="[A-Za-z\s'-]+"
            required
          >
          
          <label for="email">
            Email
          </label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            autocomplete="email"
            autocapitalize="none"
            required
          >

          <label for="password">
              Password
          </label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="new-password"
            minlength="8"
            maxlength="64"
            pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).+$"
            title="Must contain at least one uppercase letter, one lowercase letter, and one number."
            required
          >

           <label for="passwordConfirmation">
              Confirm your password
          </label>
          <input
            type="password"
            id="passwordConfirmation"
            name="passwordConfirmation"
            placeholder="Confirm your password"
            autocomplete="new-password"
            minlength="8"
            maxlength="64"
            required
          >

          <button
            type="submit"
          >
            Sign Up
          </button>
        </form>
         <p>
          Already have an account?
          <a href="login.html">
            Log In
          </a>
        </p>
      </section>

      <section class="auth-visual">
        <h2>
          Build better money habits day by day with our assistant
        </h2>
        <p>
          Use simple budgeting tools, Kakeibo system reflection, and clear spending categories.
        </p>
         <p>
            Needs  Wants  Savings
          </p>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
