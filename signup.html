<!DOCTYPE html>
<html lang="en">
  <head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>
        Sign Up | Meticulous Budgeting
    </title>

    <link rel="stylesheet" href="style.css">
  </head>
  
  <body>
    <main>
      <section>
        <h1>
          Start your journey to financial literacy today!
        </h1>

        <p>
          Let's help you set up your account.
        </p>

        <form id="signupForm">
          <label for="fullName">
            Full Name
          </label>
          <input
            type="text"
            id="fullName"
            name="fullName"
            placeholder="Enter your full name"
            required
          >
          
          <label for="email">
            Email
          </label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          >

          <label for="password">
              Password
          </label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            required
          >

           <label for="passwordConfirmation">
              Confirm your password
          </label>
          <input
            type="password"
            id="passwordConfirmation"
            name="passwordConfirmation"
            placeholder="Confirm your password"
            required
          >

          <button
            type="submit"
          >
            Sign Up
          </button>
        </form>
         <p>
          Already have an account?
          <a href="login.html">
            Log In
          </a>
        </p>
      </section>
    </main>
  </body>
</html>
